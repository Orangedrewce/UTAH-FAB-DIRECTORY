<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utah Fab Directory — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,600;1,300&family=Share+Tech+Mono&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>

<!-- ═══════════════════════════════════════════════════
     AUTH GATE — shown when not logged in
═══════════════════════════════════════════════════ -->
<div id="authGate" class="auth-gate">
  <div class="auth-box">
    <h1>UTAH <span>FAB</span> ADMIN</h1>
    <p class="auth-sub">Sign in to manage the directory</p>
    <form id="loginForm" autocomplete="on">
      <label for="authEmail" class="sr-only">Email</label>
      <input type="email" id="authEmail" placeholder="Email" required>
      <label for="authPassword" class="sr-only">Password</label>
      <input type="password" id="authPassword" placeholder="Password" required>
      <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
      <p class="auth-error" id="authError"></p>
    </form>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     ADMIN DASHBOARD — hidden until authenticated
═══════════════════════════════════════════════════ -->
<div id="adminDash" class="admin-dash hidden">

  <div class="bg-grid"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <!-- Top bar -->
  <header class="admin-header">
    <div class="admin-header-inner">
      <h1>UTAH <span>FAB</span> ADMIN</h1>
      <div class="admin-header-right">
        <a href="direct.html" class="btn btn-outline btn-sm" target="_blank" rel="noopener noreferrer">View Public Directory</a>
        <span id="adminEmail" class="admin-email"></span>
        <button id="logoutBtn" class="btn btn-outline btn-sm">Sign Out</button>
      </div>
    </div>
  </header>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-inner">
      <div class="toolbar-left">
        <input type="search" id="adminSearch" placeholder="Search shops…" class="admin-search">
        <select id="adminRegionFilter">
          <option value="">All Regions</option>
        </select>
        <select id="adminTagFilter">
          <option value="">All Tags</option>
        </select>
        <label class="toggle-label">
          <input type="checkbox" id="showInactive"> Show inactive
        </label>
      </div>
      <div class="toolbar-right">
        <div class="bulk-actions hidden" id="bulkActions">
          <span class="bulk-count" id="bulkCount">0 selected</span>
          <button type="button" class="btn btn-outline btn-sm" id="bulkToggleBtn">Toggle Active Status</button>
        </div>
        <span class="admin-count"><strong id="adminCount">0</strong> shops</span>
        <button class="btn btn-primary" id="addShopBtn">+ Add Shop</button>
      </div>
    </div>
  </div>

  <!-- Data table -->
  <div class="table-wrap">
    <div class="table-scroll">
    <table class="shop-table" id="shopTable">
      <thead>
        <tr>
          <th scope="col" class="col-select"><input type="checkbox" id="selectAll" aria-label="Select all shops"></th>
          <th scope="col" class="col-status">Active</th>
          <th scope="col" class="col-name">Name</th>
          <th scope="col" class="col-city">City</th>
          <th scope="col" class="col-region">Region</th>
          <th scope="col" class="col-category">Category</th>
          <th scope="col" class="col-tags">Tags</th>
          <th scope="col" class="col-actions">Actions</th>
        </tr>
      </thead>
      <tbody id="shopTableBody">
        <!-- Rows rendered by JS -->
      </tbody>
    </table>
    <div class="table-empty hidden" id="tableEmpty">No shops found.</div>
    </div><!-- /table-scroll -->
  </div>

</div><!-- /adminDash -->

<!-- ═══════════════════════════════════════════════════
     SHOP EDIT MODAL
═══════════════════════════════════════════════════ -->
<div class="modal-backdrop hidden" id="modalBackdrop">
  <div class="modal" id="shopModal">
    <div class="modal-header">
      <h2 id="modalTitle">Add Shop</h2>
      <button class="modal-close" id="modalCloseBtn">&times;</button>
    </div>
    <form id="shopForm" class="modal-body" autocomplete="off">

      <div class="form-row">
        <div class="form-group flex-2">
          <label for="fName">Shop Name *</label>
          <input type="text" id="fName" required>
        </div>
        <div class="form-group flex-1">
          <label for="fCity">City *</label>
          <input type="text" id="fCity" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group flex-1">
          <label for="fRegion">Region *</label>
          <select id="fRegion" required></select>
        </div>
        <div class="form-group flex-1">
          <label for="fCategory">Category</label>
          <input type="text" id="fCategory" list="categoryList" value="Fabrication & Machining">
          <datalist id="categoryList"><!-- Populated by JS --></datalist>
        </div>
      </div>

      <div class="form-group">
        <label for="fSize">Size / Description</label>
        <input type="text" id="fSize" placeholder="e.g. Small family-owned — est. 1978, 45+ years">
      </div>

      <div class="form-group">
        <label for="fServices">Services</label>
        <textarea id="fServices" rows="3" placeholder="CNC milling, laser cutting, welding…"></textarea>
      </div>

      <div class="form-group">
        <label for="fWebsite">Website / Contact</label>
        <input type="text" id="fWebsite" placeholder="example.com">
      </div>

      <div class="form-group">
        <label for="fMapsUrl">Google Maps Profile URL</label>
        <input type="url" id="fMapsUrl" placeholder="https://maps.google.com/…">
      </div>

      <div class="form-group">
        <label>Tags</label>
        <div class="tag-picker" id="tagPicker">
          <!-- Rendered by JS -->
        </div>
      </div>

      <div class="form-row">
        <label class="toggle-label">
          <input type="checkbox" id="fIsActive" checked> Active (visible on public site)
        </label>
      </div>

      <input type="hidden" id="fId" value="">

      <div class="modal-footer">
        <button type="button" class="btn btn-outline" id="modalCancelBtn">Cancel</button>
        <button type="button" class="btn btn-danger hidden" id="deleteBtn">Delete</button>
        <button type="submit" class="btn btn-primary" id="saveBtn">Save Shop</button>
      </div>
    </form>
  </div>
</div>

<!-- Supabase JS client (CDN) -->
<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script defer src="js/admin.js"></script>
</body>
</html>
